<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vödör</title>
    <meta
      name="description"
      content="VÖDÖR. Közösségi fürdőház egy konténerben."
    >
    <link rel="preload" as="image" href="./vodor-logo-transparent.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <a class="home-mark" href="./index.html" aria-label="Vissza a Vödör nyitó oldalára">
      <img src="./vodor-home-icon.jpg" alt="Vödör kék ikon">
    </a>

    <main class="landing" aria-label="Vödör landing page">
      <section class="brand-scene" aria-label="A Vödör feltöltés alatt áll">
        <div class="illustration">
          <div class="logo-wrap">
            <img
              class="logo"
              src="./vodor-logo-transparent.png"
              alt="Vödör logó, vödör illusztrációval"
            >
          </div>
        </div>
      </section>

      <section class="copy" aria-label="Vödör bemutatkozó szöveg">
        <p>
          <strong>VÖDÖR.</strong>
          Közösségi fürdőház egy konténerben.
        </p>
      </section>

      <div class="scroll-cue-wrap">
        <a class="scroll-cue" href="#visuals" aria-label="Görgess lejjebb a látványtervekhez">
          <span>görgess lejjebb</span>
          <span class="scroll-arrow" aria-hidden="true"></span>
        </a>
      </div>
    </main>

    <section class="visual-slideshow" id="visuals" aria-label="Vödör látványtervek">
      <img class="visual-frame visual-one" src="./vodor-visual-1.jpg" alt="Vödör látványterv első skicc">
      <img class="visual-frame visual-two" src="./vodor-visual-2.jpg" alt="Vödör látványterv második skicc">
      <img class="visual-frame visual-three" src="./vodor-visual-3.jpg" alt="Vödör látványterv harmadik skicc">
      <img class="visual-frame visual-four" src="./vodor-visual-4.jpg" alt="Vödör látványterv negyedik skicc">
    </section>

    <section class="story" aria-label="Vödör vízió">
      <p>
        A Vödör egy közösségi fürdőház fatüzelésű szaunával, melegvizes dézsával,
        hideg vizes merülővel, és még sok menő cuccal, egy konténerben.
      </p>
    </section>

    <section class="wide-photo" aria-label="Vödör fürdőház illusztráció">
      <img src="./vodor-bathhouse-scene.jpg" alt="Vödör fürdőház koncepciórajz">
    </section>

    <section class="contact-bar" aria-label="Kapcsolat">
      <div class="contact-line">
        <span>nézd meg hogy áll a projekt, és kövesd a vödröt</span>
        <a href="https://www.instagram.com/vodor.project" target="_blank" rel="noreferrer" aria-label="Vödör Instagram">
          <span class="instagram-icon" aria-hidden="true"></span>
          <span>Instagram</span>
        </a>
      </div>
      <a class="email-link" href="mailto:info@vodorproject.hu">info@vodorproject.hu</a>
    </section>

    <footer class="page-footer" aria-label="Vödör oldal vége">
      <img src="./vodor-logo-transparent.png" alt="Vödör piros logó">
    </footer>
  </body>
</html>
